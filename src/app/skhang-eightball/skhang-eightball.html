<mat-card appearance="outlined">
  <mat-card-header>
    <mat-card-title>Shaun's 8 Ball Component</mat-card-title>
  </mat-card-header>
  <mat-card-content>
    <br />

    <mat-form-field class="example-full-width">
      <mat-label>Question</mat-label>
      <input
        matInput
        [value]="question()"
        placeholder="Type your question here..."
        (input)="question.set($event.target.value)"
      />
    </mat-form-field>
    &nbsp;
    <button matButton="outlined" (click)="randAnswer()">Shake 8 Ball</button>
    &nbsp;
    <br />
    <h2>{{ answer() }}</h2>
  </mat-card-content>
</mat-card>
