<mat-card
    appearance="outlined"
>
    <mat-card-header>
        <mat-card-title>
            Mohamed's Multiplication Component
        </mat-card-title>
    </mat-card-header>
    <mat-card-content>
        <br />
        <mat-form-field>
            <mat-label>
                Number One
            </mat-label>
            <input 
                matInput  
                [value]="numberOne()"
            />
        </mat-form-field>
        x
        <mat-form-field>
            <mat-label>
                Number Two
            </mat-label>
            <input 
                matInput  
                [value]="numberTwo()"
            />
        </mat-form-field>
        &nbsp;
        <button
            matButton="outlined"
        >
            =
        </button>
        &nbsp;
        {{ multiplicationResult() }}
    </mat-card-content>
</mat-card>
